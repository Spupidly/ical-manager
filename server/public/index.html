<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCal 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }

  /* 로그인 */
  #loginOverlay {
    display: none;
    position: fixed; inset: 0;
    background: #f0f2f5;
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #loginOverlay.show { display: flex; }
  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 32px;
    width: 320px;
    max-width: 90vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .login-card h2 { font-size: 20px; font-weight: 700; color: #333; text-align: center; margin-bottom: 4px; }
  .login-input {
    width: 100%;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: #007aff; }
  .login-btn {
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .login-btn:disabled { background: #aaa; cursor: not-allowed; }
  .login-error { font-size: 13px; color: #e74c3c; text-align: center; min-height: 18px; }

  /* Header */
  .header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #333; }
  .header-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
  }
  .header-title-row h1 { margin-right: auto; }
  .controls {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }
  .controls label { font-size: 13px; color: #666; }
  .controls input[type="date"] {
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .controls input[type="date"]:focus { border-color: #007aff; }
  .btn-search {
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-search:hover { background: #0066dd; }
  .btn-search:disabled { background: #aaa; cursor: not-allowed; }
  /* 날짜 피커 팝업 위에 표시되는 빠른 선택 패널 (모바일 전용) */
  #dateQuickPanel {
    display: none; /* JS로 touch 환경에서만 표시 */
    align-items: center;
    gap: 8px;
    padding: 8px 0 2px;
    border-top: 1px solid #eee;
    margin-top: 8px;
  }
  .dq-btn {
    background: #e8f4ff;
    border: 1px solid #b3d7ff;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #007aff;
    cursor: pointer;
    white-space: nowrap;
  }
  .dq-btn:active { background: #c5e3ff; }
  .badge-warning {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 600;
  }
  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #555;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .filter-toggle input { cursor: pointer; }

  .mode-tabs { display: flex; border: 1px solid #d0d0d0; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
  .mode-tab { background: #fff; border: none; padding: 6px 11px; font-size: 13px; color: #555; cursor: pointer; }
  .mode-tab + .mode-tab { border-left: 1px solid #d0d0d0; }
  .mode-tab.active { background: #007aff; color: #fff; font-weight: 600; }
  #rangeWrap { align-items: center; gap: 8px; }

  .nav-arrow {
    display: none; /* 모바일은 스와이프, 데스크탑만 버튼 표시 */
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.93);
    border: 1px solid #ddd;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 22px;
    line-height: 1;
    padding: 0;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 150;
    color: #444;
    align-items: center;
    justify-content: center;
  }
  @media (hover: hover) and (pointer: fine) {
    .nav-arrow { display: flex; }
    .nav-arrow:hover { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.18); color: #007aff; }
  }
  .nav-prev { left: 8px; }
  .nav-next { right: 8px; }

  /* Event List */
  .event-list { padding: 20px 24px; max-width: 900px; margin: 0 auto; }
  .date-group { margin-bottom: 20px; }
  .date-header {
    font-size: 13px;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 0;
    border-bottom: 2px solid #e0e0e0;
    margin-bottom: 8px;
  }

  /* Event Row */
  .event-row {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e8e8e8;
    padding: 12px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .event-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #ccc; }
  .event-row.warning { border-left: 3px solid #ffc107; }
  .event-row.no-memo { border-left: 3px solid #adb5bd; }
  .event-row.ok { border-left: 3px solid #28a745; }

  .status-icon { font-size: 18px; flex-shrink: 0; }
  .event-info { flex: 1; min-width: 0; }
  .event-title { font-size: 14px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-time { font-size: 12px; color: #888; margin-top: 2px; }
  .event-memo-hint { font-size: 11px; color: #ffa500; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-calendar { font-size: 11px; color: #999; margin-top: 1px; }

  .btn-quickfix {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-quickfix:hover { background: #ffc107; color: #fff; border-color: #e0a800; }

  /* Empty / Loading */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 14px;
  }
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 14px;
  }

  /* Modal Overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: #fff;
    border-radius: 12px;
    width: 480px;
    max-width: 100%;
    margin: auto 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 20px 24px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-title-input {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    width: 100%;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    outline: none;
    padding: 2px 0;
    transition: border-color 0.15s;
  }
  .modal-title-input:focus { border-bottom-color: #007aff; }
  .modal-calendar-name {
    font-size: 12px;
    color: #999;
    margin-top: 3px;
  }
  .btn-close {
    background: none;
    border: none;
    font-size: 20px;
    color: #999;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .btn-close:hover { color: #333; }

  .modal-body { padding: 16px 24px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #999;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .section-label:first-child { margin-top: 0; }

  .time-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .time-card {
    background: #f8f9fa;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .time-card-label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .time-card-value { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .time-card-value.mismatch { color: #e74c3c; }
  .time-card-value.match { color: #28a745; }
  .time-card-value.empty { color: #ccc; font-weight: 400; font-size: 13px; }

  .edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .edit-row input[type="time"] {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 15px;
    outline: none;
  }
  .edit-row input[type="time"]:focus { border-color: #007aff; }
  .btn-save {
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-save:hover { background: #0066dd; }
  .btn-save:disabled { background: #aaa; cursor: not-allowed; }
  .btn-danger {
    background: #fff;
    color: #e74c3c;
    border: 1px solid #e74c3c;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-right: auto;
  }
  .btn-danger:hover { background: #fff0ee; }
  .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }

  .notes-box {
    background: #f8f9fa;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #444;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 200px;
    max-height: min(500px, 40vh);
    overflow-y: auto;
    line-height: 1.6;
    width: 100%;
    resize: vertical;
    outline: none;
    -webkit-touch-callout: none; /* iOS 롱프레스 콜아웃 메뉴 차단 */
  }
  .notes-box:focus { border-color: #007aff; }

  /* AI placeholder */
  .ai-area {
    margin-top: 16px;
    min-height: 44px;
    border: 1px dashed #e0e0e0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 12px;
  }

  .modal-footer {
    padding: 12px 24px 20px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .btn-secondary {
    background: #f0f2f5;
    color: #555;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-secondary:hover { background: #e4e6e9; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 300;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Edit time grid */
  .edit-time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .edit-time-grid .time-card { min-width: 0; }
  .edit-time-grid .time-card:focus-within { box-shadow: 0 0 0 1.5px #007aff; }
  .edit-time-grid .time-card.changed {
    background: #e8f4ff;
    box-shadow: 0 0 0 1.5px #007aff;
  }
  .edit-time-grid .time-card.changed .time-card-label { color: #007aff; }
  .edit-time-grid .time-card.changed .time-card-val { color: #007aff; font-weight: 700; }
  .time-card-val-wrap { position: relative; min-height: 26px; }
  .time-card-val {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 26px;
    pointer-events: none;
  }
  .time-card-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    /* 값은 JS로 읽기 위해 DOM에 유지, 표시는 .time-card-val이 담당 */
    border: none;
    padding: 0;
    background: transparent;
    outline: none;
  }

  /* Time picker popup */
  #timePickerPopup {
    position: fixed;
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    padding: 6px;
    z-index: 400;
    min-width: 160px;
    max-height: 320px;
    overflow-y: auto;
    -webkit-user-select: none;
    user-select: none;
  }
  .tp-header {
    font-size: 13px; font-weight: 700; color: #333;
    padding: 4px 8px 8px; border-bottom: 1px solid #eee;
    margin-bottom: 4px; text-align: center;
  }
  .tp-btn {
    display: block; width: 100%; background: none; border: none;
    border-radius: 6px; padding: 7px 12px; font-size: 13px;
    text-align: left; cursor: pointer; color: #333;
  }
  .tp-btn:hover { background: #f0f2f5; }
  /* iOS 포커스 자동줌 방지: font-size 16px 미만 입력 필드에서 발생 */
  @media (max-width: 768px) {
    .notes-box,
    .time-card-input,
    .controls input[type="date"],
    #singleMonth { font-size: 16px; }
  }

  /* 데스크탑(마우스): 클릭(포커스) 시에만 네이티브 time input 표시, blur 시 24h span 복귀 */
  @media (hover: hover) and (pointer: fine) {
    .time-card-val-wrap { cursor: pointer; }
    .time-card-input:focus {
      opacity: 1;
      background: #f8f9fa;
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      z-index: 1;
    }
    .edit-time-grid .time-card.changed .time-card-input:focus {
      color: #007aff;
      background: #e8f4ff;
    }
  }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <h2>📅 iCal 관리</h2>
    <input class="login-input" type="text"     id="loginUser" placeholder="아이디" autocomplete="username">
    <input class="login-input" type="password" id="loginPass" placeholder="비밀번호" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="header">
  <div class="header-title-row">
    <h1>📅 iCal 관리</h1>
    <label class="filter-toggle">
      <input type="checkbox" id="filterWarnings" onchange="renderEvents()">
      ⚠️만 보기
    </label>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="month" onclick="switchMode('month')">월별</button>
      <button class="mode-tab" data-mode="week"  onclick="switchMode('week')">주별</button>
      <button class="mode-tab" data-mode="day"   onclick="switchMode('day')">일별</button>
      <button class="mode-tab" data-mode="range" onclick="switchMode('range')">기간</button>
    </div>
  </div>
  <div class="controls">
    <div id="singleDateWrap" style="display:contents">
      <input type="month" id="singleMonth">
      <input type="date"  id="singleDate" style="display:none">
    </div>
    <div id="rangeWrap" style="display:none">
      <label>시작</label>
      <input type="date" id="startDate">
      <label>종료</label>
      <input type="date" id="endDate">
    </div>
    <button class="btn-search" id="btnSearch" onclick="fetchEvents()">조회</button>
    <span class="badge-warning" id="warningBadge" style="display:none"></span>
  </div>
  <!-- 날짜 피커 열릴 때 헤더 하단에 표시되는 빠른 선택 패널 (touch 기기 전용) -->
  <div id="dateQuickPanel">
    <button class="dq-btn" id="dqThisMonth">이번달</button>
    <button class="dq-btn" id="dqToday">오늘</button>
  </div>
</div>

<button class="nav-arrow nav-prev" onclick="navigatePeriod(-1)" title="이전">‹</button>
<button class="nav-arrow nav-next" onclick="navigatePeriod(1)"  title="다음">›</button>
<div class="event-list" id="eventList">
  <div class="empty-state">기간을 선택하고 조회 버튼을 눌러주세요.</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div style="flex:1;min-width:0">
        <input type="text" class="modal-title-input" id="modalTitle" placeholder="이벤트 제목">
        <div class="modal-calendar-name" id="modalCalendar"></div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="section-label">캘린더 시간</div>
      <div class="time-grid">
        <div class="time-card">
          <div class="time-card-label">시작</div>
          <div class="time-card-value" id="calStartVal"></div>
        </div>
        <div class="time-card">
          <div class="time-card-label">종료</div>
          <div class="time-card-value" id="calEndVal"></div>
        </div>
      </div>

      <div class="section-label">메모에서 추출한 시간</div>
      <div class="time-grid">
        <div class="time-card">
          <div class="time-card-label">예상 시작</div>
          <div class="time-card-value" id="memoStartVal"></div>
        </div>
        <div class="time-card">
          <div class="time-card-label">예상 종료</div>
          <div class="time-card-value" id="memoEndVal"></div>
        </div>
      </div>

      <div class="section-label">시간 수정</div>
      <div class="edit-time-grid">
        <div class="time-card">
          <div class="time-card-label">시작</div>
          <div class="time-card-val-wrap">
            <span class="time-card-val" id="newStartTimeVal">--:--</span>
            <input type="time" id="newStartTime" class="time-card-input">
          </div>
        </div>
        <div class="time-card">
          <div class="time-card-label">종료</div>
          <div class="time-card-val-wrap">
            <span class="time-card-val" id="newEndTimeVal">--:--</span>
            <input type="time" id="newEndTime" class="time-card-input">
          </div>
        </div>
      </div>
      <div id="timePickHint" style="display:none;font-size:11px;color:#007aff;text-align:center;margin-top:6px;">
        ↓ 메모에서 시간을 탭하세요
      </div>
      <div class="section-label">메모 내용 <span style="font-size:10px;color:#ccc;font-weight:400;text-transform:none;letter-spacing:0">· 더블클릭 / 시간란 선택 후 탭으로 적용</span></div>
      <textarea class="notes-box" id="notesBox" spellcheck="false" placeholder="메모 없음"></textarea>

      <!-- AI 분석 영역 예약 -->
      <div class="ai-area" id="aiArea">AI 분석 버튼이 여기에 추가됩니다</div>

    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btnDelete" onclick="deleteEvent()">삭제</button>
      <button class="btn-secondary" onclick="closeModal()">닫기</button>
      <button class="btn-save" id="btnSave" onclick="saveTime()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 인증 ──────────────────────────────────────────────
const TOKEN_KEY = 'ical_auth_token';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

function showLogin(msg) {
  document.getElementById('loginError').textContent = msg || '';
  document.getElementById('loginOverlay').classList.add('show');
}
function hideLogin() {
  document.getElementById('loginOverlay').classList.remove('show');
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn  = document.getElementById('loginBtn');
  const err  = document.getElementById('loginError');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '로그인 중...';
  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || '로그인 실패'; return; }
    setToken(data.token);
    hideLogin();
  } catch {
    err.textContent = '서버에 연결할 수 없습니다.';
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': `Bearer ${t}` } : {};
}

async function apiFetch(url, options = {}) {
  options.headers = { ...options.headers, ...authHeaders() };
  const res = await fetch(url, options);
  if (res.status === 401) {
    clearToken();
    showLogin('세션이 만료되었습니다. 다시 로그인해주세요.');
    throw new Error('인증이 필요합니다.');
  }
  return res;
}

// 페이지 로드 시 토큰 없으면 로그인 화면 표시
if (!getToken()) showLogin();

// 로그인 폼 Enter 키 처리
document.addEventListener('DOMContentLoaded', () => {
  ['loginUser', 'loginPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
});

let allEvents = [];
let currentEvent = null;
let initStart = null, initEnd = null; // 모달 열릴 때 입력란 초기값 (비교 기준)
let currentMode = 'month';
let lastQueryStart = '', lastQueryEnd = '';

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 월 단위 날짜 이동 (말일 초과 시 해당 월 말일로 클램핑)
function addMonths(date, months) {
  const targetMonth = date.getMonth() + months;
  const result = new Date(date.getFullYear(), targetMonth, 1);
  const lastDay = new Date(result.getFullYear(), result.getMonth() + 1, 0).getDate();
  return new Date(result.getFullYear(), result.getMonth(), Math.min(date.getDate(), lastDay));
}

function getDateRange() {
  if (currentMode === 'range') {
    return { start: document.getElementById('startDate').value,
             end:   document.getElementById('endDate').value };
  }
  if (currentMode === 'month') {
    const val = document.getElementById('singleMonth').value; // YYYY-MM
    if (!val) return { start: '', end: '' };
    const [y, m] = val.split('-').map(Number);
    return { start: toDateStr(new Date(y, m - 1, 1)),
             end:   toDateStr(new Date(y, m, 0)) };
  }
  const dateVal = document.getElementById('singleDate').value;
  if (!dateVal) return { start: '', end: '' };
  const d = new Date(dateVal + 'T00:00:00');
  if (currentMode === 'day') return { start: dateVal, end: dateVal };
  if (currentMode === 'week') {
    const day = d.getDay();
    const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return { start: toDateStr(mon), end: toDateStr(sun) };
  }
  return { start: '', end: '' };
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.mode === mode)
  );
  const isRange = mode === 'range';
  const isMonth = mode === 'month';
  document.getElementById('singleDateWrap').style.display = isRange                ? 'none'     : 'contents';
  document.getElementById('rangeWrap').style.display      = isRange                ? 'flex'     : 'none';
  document.getElementById('singleMonth').style.display    = (!isRange && isMonth)  ? ''         : 'none';
  document.getElementById('singleDate').style.display     = (!isRange && !isMonth) ? ''         : 'none';
}

// 이전/다음 기간으로 이동 후 재조회
function navigatePeriod(dir) {
  if (currentMode === 'month') {
    const val = document.getElementById('singleMonth').value;
    if (!val) return;
    const [y, m] = val.split('-').map(Number);
    const next = new Date(y, m - 1 + dir, 1);
    document.getElementById('singleMonth').value =
      `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
  } else if (currentMode === 'week') {
    const val = document.getElementById('singleDate').value;
    if (!val) return;
    const d = new Date(val + 'T00:00:00');
    d.setDate(d.getDate() + dir * 7);
    document.getElementById('singleDate').value = toDateStr(d);
  } else if (currentMode === 'day') {
    const val = document.getElementById('singleDate').value;
    if (!val) return;
    const d = new Date(val + 'T00:00:00');
    d.setDate(d.getDate() + dir);
    document.getElementById('singleDate').value = toDateStr(d);
  } else if (currentMode === 'range') {
    const s = document.getElementById('startDate').value;
    const e = document.getElementById('endDate').value;
    if (!s || !e) return;
    const startD = new Date(s + 'T00:00:00');
    const endD   = new Date(e + 'T00:00:00');
    const days   = Math.round((endD - startD) / 86400000) + 1; // 조회 기간 일수
    let newStart, newEnd;
    if (dir === 1) { // 다음 기간: 시작 = 기존 종료 + 1일
      newStart = new Date(endD); newStart.setDate(newStart.getDate() + 1);
      newEnd   = new Date(newStart); newEnd.setDate(newEnd.getDate() + days - 1);
    } else {         // 이전 기간: 종료 = 기존 시작 - 1일
      newEnd   = new Date(startD); newEnd.setDate(newEnd.getDate() - 1);
      newStart = new Date(newEnd); newStart.setDate(newStart.getDate() - (days - 1));
    }
    document.getElementById('startDate').value = toDateStr(newStart);
    document.getElementById('endDate').value   = toDateStr(newEnd);
  }
  fetchEvents();
}

// 이번달 단축 버튼
function gotoThisMonth() {
  const t = new Date();
  const y = t.getFullYear(), m = String(t.getMonth() + 1).padStart(2, '0');
  if (currentMode === 'month') {
    document.getElementById('singleMonth').value = `${y}-${m}`;
  } else if (currentMode === 'week' || currentMode === 'day') {
    document.getElementById('singleDate').value = toDateStr(t);
  } else if (currentMode === 'range') {
    const lastDay = new Date(t.getFullYear(), t.getMonth() + 1, 0);
    document.getElementById('startDate').value = `${y}-${m}-01`;
    document.getElementById('endDate').value   = toDateStr(lastDay);
  }
  fetchEvents();
}

// 오늘 단축 버튼
function gotoToday() {
  const t = new Date();
  const y = t.getFullYear(), m = String(t.getMonth() + 1).padStart(2, '0');
  if (currentMode === 'month') {
    document.getElementById('singleMonth').value = `${y}-${m}`;
  } else if (currentMode === 'week' || currentMode === 'day') {
    document.getElementById('singleDate').value = toDateStr(t);
  } else if (currentMode === 'range') {
    document.getElementById('endDate').value = toDateStr(t);
  }
  fetchEvents();
}

// HH:mm 패턴 추출 (날짜 헤더가 있으면 해당 날짜 섹션만, 없으면 전체)
function extractTimesForDate(notes, eventDate) {
  if (!notes) return [];
  if (!/^\d{4}\/\d{2}\/\d{2}/m.test(notes)) {
    return notes.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/g) || [];
  }
  const target = eventDate.replace(/-/g, '/'); // "2026-06-17" → "2026/06/17"
  let inSection = false;
  const relevant = [];
  for (const line of notes.split('\n')) {
    if (/^\d{4}\/\d{2}\/\d{2}/.test(line)) inSection = line.startsWith(target);
    if (inSection) relevant.push(line);
  }
  return relevant.join('\n').match(/\b([01]?\d|2[0-3]):[0-5]\d\b/g) || [];
}

// memoEnd 시간이 포함된 메모 줄 반환 (날짜 섹션 필터 적용)
function findMemoEndLine(notes, eventDate, time) {
  if (!notes || !time) return null;
  let lines = notes.split('\n');
  if (/^\d{4}\/\d{2}\/\d{2}/m.test(notes)) {
    const target = eventDate.replace(/-/g, '/');
    let inSection = false;
    lines = [];
    for (const line of notes.split('\n')) {
      if (/^\d{4}\/\d{2}\/\d{2}/.test(line)) inSection = line.startsWith(target);
      if (inSection) lines.push(line);
    }
  }
  let result = null;
  for (const line of lines) {
    if (line.includes(time)) result = line.trim();
  }
  return result;
}

// 이벤트 상태 분석
function analyzeEvent(event) {
  const times = extractTimesForDate(event.notes, event.startTime.slice(0, 10));
  const calStart = event.startTime.slice(11, 16);
  const calEnd   = event.endTime.slice(11, 16);

  if (!event.notes || event.notes.trim() === '' || times.length === 0) {
    return { status: 'no-memo', times, memoStart: null, memoEnd: null, memoEndLine: null, calStart, calEnd };
  }

  const memoStart   = calStart;
  const memoEnd     = times[times.length - 1];
  const memoEndLine = findMemoEndLine(event.notes, event.startTime.slice(0, 10), memoEnd);
  const status      = calEnd !== memoEnd ? 'warning' : 'ok';

  return { status, times, memoStart, memoEnd, memoEndLine, calStart, calEnd };
}

// API 호출
async function fetchEvents() {
  const { start, end } = getDateRange();
  if (!start || !end) { showToast('기간을 선택해주세요.'); return; }
  lastQueryStart = start;
  lastQueryEnd   = end;

  const btn = document.getElementById('btnSearch');
  btn.disabled = true;
  btn.textContent = '조회 중...';
  document.getElementById('eventList').innerHTML = '<div class="loading">캘린더 데이터를 불러오는 중...</div>';

  try {
    const res = await apiFetch(`/api/events?start=${start}&end=${end}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allEvents = data;
    renderEvents();
  } catch (err) {
    document.getElementById('eventList').innerHTML =
      `<div class="empty-state">오류: ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '조회';
  }
}

// 이벤트 렌더링
function renderEvents() {
  const filterOn = document.getElementById('filterWarnings').checked;
  const events   = filterOn ? allEvents.filter(e => analyzeEvent(e).status === 'warning') : allEvents;

  const warnings = allEvents.filter(e => analyzeEvent(e).status === 'warning');
  const badge    = document.getElementById('warningBadge');
  if (allEvents.length > 0) {
    badge.style.display = '';
    badge.textContent   = `⚠️ ${warnings.length}건 / 총 ${allEvents.length}건`;
  } else {
    badge.style.display = 'none';
  }

  const container = document.getElementById('eventList');
  if (events.length === 0) {
    container.innerHTML = '<div class="empty-state">' +
      (allEvents.length === 0 ? '조회 결과가 없습니다.' : '⚠️ 항목이 없습니다.') + '</div>';
    return;
  }

  // 날짜별 그룹화
  const groups = {};
  events.forEach(e => {
    const date = e.startTime.slice(0, 10);
    if (!groups[date]) groups[date] = [];
    groups[date].push(e);
  });

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const label = formatDateLabel(date);
    html += `<div class="date-group"><div class="date-header">${label}</div>`;
    groups[date].forEach(event => {
      html += renderEventRow(event);
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function renderEventRow(event) {
  const analysis = analyzeEvent(event);
  const { status, memoEnd, memoEndLine, calEnd } = analysis;
  const id = escAttr(event.id);

  const statusIcon = { warning: '⚠️', 'no-memo': '📝', ok: '✅' }[status] || '❓';
  const hint = status === 'warning'
    ? `<div class="event-memo-hint">메모 종료: ${escHtml(memoEndLine || memoEnd)}</div>`
    : '';

  const quickBtn = status === 'warning' && memoEnd
    ? `<button class="btn-quickfix" onclick="event.stopPropagation();quickFix('${id}','${memoEnd}')">이 시간으로 수정</button>`
    : '';

  return `
    <div class="event-row ${status}" onclick="openModal('${id}')" data-id="${id}">
      <span class="status-icon">${statusIcon}</span>
      <div class="event-info">
        <div class="event-title">${escHtml(event.title)}</div>
        <div class="event-time">${event.startTime.slice(11,16)} ~ ${event.endTime.slice(11,16)}</div>
        ${hint}
        <div class="event-calendar">${escHtml(event.calendar)}</div>
      </div>
      ${quickBtn}
    </div>`;
}

// 빠른 수정 (모달 없이)
async function quickFix(eventId, memoEnd) {
  const event = allEvents.find(e => e.id === eventId);
  if (!event) return;
  try {
    await callModifyAPI(eventId, { endTime: memoEnd });
    event.endTime = event.endTime.slice(0, 11) + memoEnd;
    renderEvents();
    showToast(`✅ 종료시간을 ${memoEnd}로 수정했습니다.`);
  } catch (err) {
    showToast('저장 실패: ' + err.message, true);
  }
}

// 모달 열기
function openModal(eventId) {
  const event = allEvents.find(e => e.id === eventId);
  if (!event) return;
  currentEvent = event;

  const analysis = analyzeEvent(event);
  const { memoStart, memoEnd, calStart, calEnd, status } = analysis;

  document.getElementById('modalTitle').value    = event.title;
  document.getElementById('modalCalendar').textContent = event.calendar + '  |  ' + event.startTime.slice(0, 10);

  setTimeCard('calStartVal', calStart, null);
  setTimeCard('calEndVal',   calEnd,   null);
  setTimeCard('memoStartVal', memoStart, memoStart && memoStart !== calStart ? 'mismatch' : memoStart ? 'match' : null);
  setTimeCard('memoEndVal',   memoEnd,   memoEnd   && memoEnd   !== calEnd   ? 'mismatch' : memoEnd   ? 'match' : null);

  initStart = memoStart || calStart;
  initEnd   = memoEnd   || calEnd;
  document.getElementById('newStartTime').value = initStart;
  document.getElementById('newEndTime').value   = initEnd;
  updateTimeDisplay('newStartTime');
  updateTimeDisplay('newEndTime');
  // 변경 하이라이트 초기화
  document.getElementById('newStartTime').closest('.time-card').classList.remove('changed');
  document.getElementById('newEndTime').closest('.time-card').classList.remove('changed');

  document.getElementById('notesBox').value = event.notes || '';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function setTimeCard(id, value, cssClass) {
  const el = document.getElementById(id);
  el.textContent = value || '없음';
  el.className   = 'time-card-value' + (value ? (cssClass ? ' ' + cssClass : '') : ' empty');
}

// 모달 닫기
async function deleteEvent() {
  if (!currentEvent) return;
  const title = currentEvent.title || '(제목 없음)';
  if (!confirm(`"${title}" 일정을 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;

  const btn = document.getElementById('btnDelete');
  btn.disabled = true;
  btn.textContent = '삭제 중...';
  const id = currentEvent.id;
  try {
    const res  = await apiFetch(`/api/events/${encodeURIComponent(id)}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allEvents = allEvents.filter(e => e.id !== id);
    closeModal();
    renderEvents();
    showToast(`🗑️ "${title}" 삭제 완료`);
  } catch (err) {
    showToast('삭제 실패: ' + err.message, true);
    btn.disabled = false;
    btn.textContent = '삭제';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentEvent = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// 종료시간 저장
async function saveTime() {
  if (!currentEvent) {
    showToast('저장 오류: 이벤트가 선택되지 않았습니다', true);
    return;
  }
  const startTime = document.getElementById('newStartTime').value;
  const endTime   = document.getElementById('newEndTime').value;

  const savedId   = currentEvent.id;

  // 줄바꿈 정규화 (\r\n → \n) 후 비교 — iOS 줄바꿈 차이 방어
  const normalize  = s => (s || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const newNotes   = normalize(document.getElementById('notesBox').value);
  const origNotes  = normalize(currentEvent.notes);

  // iOS input[type="time"]는 HH:MM:SS를 반환할 수 있으므로 앞 5자만 사용
  const st = startTime ? startTime.slice(0, 5) : '';
  const et = endTime   ? endTime.slice(0, 5)   : '';

  // 비교 기준 = 캘린더 실제 시간 (calStart/calEnd)
  // initStart/initEnd는 memoTime으로 채워질 수 있어 기준으로 쓰면 "변경 없음"으로 잘못 판정됨
  const calStart = currentEvent.startTime.slice(11, 16);
  const calEnd   = currentEvent.endTime.slice(11, 16);

  const newTitle  = document.getElementById('modalTitle').value.trim();
  const origTitle = currentEvent.title;

  const changes = {};
  if (st && st !== calStart)              changes.startTime = st;
  if (et && et !== calEnd)                changes.endTime   = et;
  if (newNotes !== origNotes)             changes.notes     = newNotes;
  if (newTitle && newTitle !== origTitle) changes.title     = newTitle;

  console.log('[saveTime] st:', st, '/ calStart:', calStart, '/ initStart:', initStart);
  console.log('[saveTime] et:', et, '/ calEnd:', calEnd, '/ initEnd:', initEnd);
  console.log('[saveTime] notesChanged:', newNotes !== origNotes);
  console.log('[saveTime] changes:', JSON.stringify(Object.keys(changes)));

  if (Object.keys(changes).length === 0) {
    const why = [
      st ? (st === calStart ? '시작 동일' : null) : null,
      et ? (et === calEnd   ? '종료 동일' : null) : null,
      newNotes === origNotes ? '메모 동일' : null,
    ].filter(Boolean).join(' / ');
    showToast(`변경 사항 없음${why ? ' (' + why + ')' : ''}`);
    return;
  }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    await callModifyAPI(savedId, changes);
    const event = allEvents.find(e => e.id === savedId);
    if (changes.startTime)           event.startTime = event.startTime.slice(0, 11) + changes.startTime;
    if (changes.endTime)             event.endTime   = event.endTime.slice(0, 11)   + changes.endTime;
    if (changes.notes !== undefined) event.notes     = changes.notes;
    if (changes.title)               event.title     = changes.title;

    closeModal();
    renderEvents();
    const parts = [];
    if (changes.title)               parts.push(`제목 → ${changes.title}`);
    if (changes.startTime)           parts.push(`시작 → ${changes.startTime}`);
    if (changes.endTime)             parts.push(`종료 → ${changes.endTime}`);
    if (changes.notes !== undefined) parts.push('메모 저장');
    showToast(`✅ ${parts.join(' / ')}`);

    // 저장 후 EventKit 실제 반영 여부 백그라운드 검증
    verifyAfterSave(savedId, changes);

    setTimeout(() => {
      const warnings = allEvents.filter(e => analyzeEvent(e).status === 'warning');
      const savedEvent = allEvents.find(e => e.id === savedId);
      const next = warnings.find(e => e.startTime > savedEvent.startTime)
                || (warnings.length > 0 ? warnings[0] : null);
      if (next) openModal(next.id);
    }, 400);
  } catch (err) {
    console.error('[saveTime] 저장 실패:', err);
    showToast('저장 실패: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '저장';
  }
}

// 저장 후 1초 뒤 EventKit 재조회로 실제 반영 여부 검증
function updateTimeDisplay(inputId) {
  const inp   = document.getElementById(inputId);
  const valEl = document.getElementById(inputId + 'Val');
  if (inp && valEl) valEl.textContent = inp.value ? inp.value.slice(0, 5) : '--:--';
}

async function verifyAfterSave(savedId, changes) {
  const start = lastQueryStart;
  const end   = lastQueryEnd;
  if (!start || !end) return;

  await new Promise(r => setTimeout(r, 1000));

  try {
    const res  = await apiFetch(`/api/events?start=${start}&end=${end}`);
    const data = await res.json();
    if (data.error || !Array.isArray(data)) return;

    const normalize = s => (s || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const fresh = data.find(e => e.id === savedId);

    if (!fresh) {
      // 반복 이벤트 분리(detach) 후 ID가 바뀐 경우 — 새 ID로 allEvents 갱신
      allEvents = data;
      renderEvents();
      return;
    }

    let mismatch = false;
    if (changes.startTime && fresh.startTime.slice(11,16) !== changes.startTime) mismatch = true;
    if (changes.endTime   && fresh.endTime.slice(11,16)   !== changes.endTime)   mismatch = true;
    if (changes.notes !== undefined && normalize(fresh.notes) !== normalize(changes.notes)) mismatch = true;
    if (changes.title && fresh.title !== changes.title) mismatch = true;

    // allEvents를 서버 실제값으로 갱신
    allEvents = data;
    renderEvents();

    if (mismatch) {
      showToast('⚠️ 저장됐지만 캘린더에 반영되지 않았습니다. 다시 시도해 주세요.', true);
      console.warn('[verify] 저장 불일치:', { savedId, changes, fresh });
    }
  } catch (e) {
    console.warn('[verify] 재조회 실패:', e);
  }
}

async function callModifyAPI(eventId, changes) {
  const res = await apiFetch(`/api/events/${encodeURIComponent(eventId)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(changes)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// 날짜 레이블
function formatDateLabel(dateStr) {
  const d   = new Date(dateStr + 'T00:00:00');
  const day = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
  return `${dateStr} (${day})`;
}

// Toast 알림
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent  = msg;
  t.style.background = isError ? '#e74c3c' : '#1a1a1a';
  t.classList.remove('show');
  // reflow 강제 → 같은 메시지 연속 호출 시에도 애니메이션 재시작
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), isError ? 6000 : 2800);
}

// XSS 방어
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// 데스크탑: 더블클릭 → 커서 줄의 시간 추출
function notesTimePick(el, clientX, clientY) {
  const pos  = el.selectionStart;
  const text = el.value;
  const ls   = text.lastIndexOf('\n', pos - 1) + 1;
  const le   = text.indexOf('\n', pos);
  const line = text.slice(ls, le === -1 ? undefined : le);
  const m    = line.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/);
  if (m) showTimePickerPopup(clientX, clientY, m[0]);
}

document.getElementById('notesBox').addEventListener('dblclick', function(e) {
  notesTimePick(this, e.clientX, e.clientY);
});

// 모바일: 메모 텍스트 터치로 시간 추출
// ① 시간 입력란 포커스 중 → 탭 위치 시간 즉시 적용 (주요 방식)
// ② 롱프레스 → 팝업 선택 (보조 방식)
(function() {
  let lpTimer = null, lpOrigin = null;
  const nb         = document.getElementById('notesBox');
  const startInput = document.getElementById('newStartTime');
  const endInput   = document.getElementById('newEndTime');
  const hint       = document.getElementById('timePickHint');

  // 시간 입력란 포커스 시 힌트 표시
  [startInput, endInput].forEach(inp => {
    inp.addEventListener('focus', () => { hint.style.display = ''; });
    inp.addEventListener('blur',  () => { hint.style.display = 'none'; });
  });

  // 시간 변경 시 카드 하이라이트
  function syncChangedStyle(inp, initVal) {
    const changed = inp.value && inp.value !== initVal;
    inp.closest('.time-card').classList.toggle('changed', changed);
  }
  startInput.addEventListener('change', () => { syncChangedStyle(startInput, initStart); updateTimeDisplay('newStartTime'); });
  endInput.addEventListener('change',   () => { syncChangedStyle(endInput,   initEnd);   updateTimeDisplay('newEndTime');   });

  nb.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    const t  = e.touches[0];
    const el = this;

    // ① 시간 입력란 포커스 중: 탭 위치 줄의 시간을 바로 적용
    const focused = document.activeElement;
    if (focused === startInput || focused === endInput) {
      e.preventDefault(); // textarea로 포커스 이동 방지
      const rect  = el.getBoundingClientRect();
      const style = getComputedStyle(el);
      const lineH = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.6;
      const padT  = parseFloat(style.paddingTop)  || 0;
      const relY  = t.clientY - rect.top + el.scrollTop - padT;
      const idx   = Math.max(0, Math.floor(relY / lineH));
      const lines = el.value.split('\n');
      const line  = lines[Math.min(idx, lines.length - 1)] || '';
      const m     = line.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/);
      if (m) {
        const inp      = focused;
        const initVal  = inp === startInput ? initStart : initEnd;
        const timeVal  = m[0];
        const label    = inp === startInput ? '시작' : '종료';
        inp.blur(); // 피커 먼저 닫기 (blur 전에 value 설정하면 iOS 피커가 override할 수 있음)
        setTimeout(() => {
          inp.value = timeVal; // 피커 닫힌 후 값 설정
          syncChangedStyle(inp, initVal);
          updateTimeDisplay(inp.id);
          showToast(`${label} 시간 ${timeVal} 적용`);
        }, 50);
      }
      return;
    }

    // ② 롱프레스 감지
    lpOrigin = { x: t.clientX, y: t.clientY };
    lpTimer = setTimeout(() => {
      lpTimer = null;
      if (navigator.vibrate) navigator.vibrate(40);
      const pos  = el.selectionStart;
      const text = el.value;
      const ls   = text.lastIndexOf('\n', pos - 1) + 1;
      const le   = text.indexOf('\n', pos);
      const line = text.slice(ls, le === -1 ? undefined : le);
      const m    = line.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/);
      if (!m) return;
      const rect    = el.getBoundingClientRect();
      const style   = getComputedStyle(el);
      const lineH   = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.6;
      const padT    = parseFloat(style.paddingTop)  || 0;
      const lineNum = (text.slice(0, pos).match(/\n/g) || []).length;
      const lineY   = rect.top + padT + lineNum * lineH + lineH * 0.5 - el.scrollTop;
      showTimePickerPopup(lpOrigin.x, lineY, m[0]);
    }, 500);
  }, { passive: false }); // ① 경우의 preventDefault를 위해 non-passive

  nb.addEventListener('selectstart', function(e) {
    if (lpTimer) e.preventDefault();
  });

  nb.addEventListener('touchmove', function(e) {
    if (!lpTimer || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - lpOrigin.x;
    const dy = e.touches[0].clientY - lpOrigin.y;
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) { clearTimeout(lpTimer); lpTimer = null; }
  }, { passive: true });

  ['touchend', 'touchcancel'].forEach(ev =>
    nb.addEventListener(ev, () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }, { passive: true })
  );

  // 데스크탑: mousedown은 focus 이동 전에 발생 → time input 포커스 중 클릭으로 시간 적용
  nb.addEventListener('mousedown', function(e) {
    const focused = document.activeElement;
    if (focused !== startInput && focused !== endInput) return;
    e.preventDefault(); // textarea로 포커스 이동 차단
    const el    = this;
    const rect  = el.getBoundingClientRect();
    const style = getComputedStyle(el);
    const lineH = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.6;
    const padT  = parseFloat(style.paddingTop)  || 0;
    const relY  = e.clientY - rect.top + el.scrollTop - padT;
    const idx   = Math.max(0, Math.floor(relY / lineH));
    const lines = el.value.split('\n');
    const line  = lines[Math.min(idx, lines.length - 1)] || '';
    const m     = line.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/);
    if (!m) return;
    const inp     = focused;
    const initVal = inp === startInput ? initStart : initEnd;
    const timeVal = m[0];
    const label   = inp === startInput ? '시작' : '종료';
    inp.blur();
    setTimeout(() => {
      inp.value = timeVal;
      syncChangedStyle(inp, initVal);
      updateTimeDisplay(inp.id);
      showToast(`${label} 시간 ${timeVal} 적용`);
    }, 50);
  });
})();


function showTimePickerPopup(x, y, time) {
  removeTimePickerPopup();
  const popup = document.createElement('div');
  popup.id = 'timePickerPopup';
  popup.innerHTML =
    `<div class="tp-header">${escHtml(time)}</div>` +
    `<button class="tp-btn" onclick="applyNoteTime('start','${escAttr(time)}')">시작 시간으로</button>` +
    `<button class="tp-btn" onclick="applyNoteTime('end','${escAttr(time)}')">종료 시간으로</button>`;
  document.body.appendChild(popup);
  const pw = 168, ph = 96;
  // iOS touch clientX/Y는 visual viewport 좌표 → position:fixed와 동일 좌표계
  // vv.offsetTop/Left를 더하면 오히려 틀림; width/height만으로 경계 클램핑
  const vv      = window.visualViewport;
  const vWidth  = vv ? vv.width  : window.innerWidth;
  const vHeight = vv ? vv.height : window.innerHeight;
  const fy = Math.min(y, vHeight - 8); // 키보드에 가려진 경우 클램핑
  let left = Math.min(Math.max(x - pw / 2, 8), vWidth - pw - 8);
  let top  = fy - ph - 8;
  if (top < 8) top = fy + 8;
  if (top + ph > vHeight - 8) top = vHeight - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
  setTimeout(() => document.addEventListener('click', removeTimePickerPopup, { once: true }), 0);
}

function removeTimePickerPopup() {
  const p = document.getElementById('timePickerPopup');
  if (p) p.remove();
}

function applyNoteTime(type, time) {
  const inputId = type === 'start' ? 'newStartTime' : 'newEndTime';
  const inp = document.getElementById(inputId);
  inp.value = time;
  inp.dispatchEvent(new Event('change'));
  removeTimePickerPopup();
}

// ESC 키로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// 날짜 피커 열릴 때 헤더에 빠른 선택 패널 표시 (touch 기기 전용)
(function() {
  const isTouch = () => navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
  const panel   = document.getElementById('dateQuickPanel');
  const dateInputIds = ['singleMonth', 'singleDate', 'startDate', 'endDate'];
  let hideTimer = null;

  function showPanel() {
    if (!isTouch()) return;
    clearTimeout(hideTimer);
    const showMonth = (currentMode === 'month' || currentMode === 'range');
    document.getElementById('dqThisMonth').style.display = showMonth ? '' : 'none';
    document.getElementById('dqToday').style.display     = showMonth ? 'none' : '';
    panel.style.display = 'flex';
  }
  function hidePanel() {
    panel.style.display = 'none';
  }
  function scheduleHide() {
    // blur 직후 버튼 touchstart 가 발생할 수 있어 200ms 유예
    hideTimer = setTimeout(hidePanel, 200);
  }

  dateInputIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('focus', showPanel);
    el.addEventListener('blur',  scheduleHide);
  });

  // 버튼: pointerdown + preventDefault 로 input blur 방지 후 처리
  function handleQuickBtn(fn) {
    return function(e) {
      e.preventDefault(); // input이 blur 되지 않도록 (focus 이동 차단)
      clearTimeout(hideTimer);
      fn();
      // 네이티브 피커 닫기 위해 포커스된 input blur
      const focused = document.activeElement;
      if (focused && dateInputIds.includes(focused.id)) focused.blur();
      hidePanel();
    };
  }

  document.getElementById('dqThisMonth').addEventListener('pointerdown', handleQuickBtn(gotoThisMonth));
  document.getElementById('dqToday').addEventListener('pointerdown',     handleQuickBtn(gotoToday));
})();

// 모바일: 이벤트 목록 좌/우 스와이프로 기간 이동
(function() {
  let sx = null, sy = null;
  const el = document.getElementById('eventList');
  el.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (sx === null) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    sx = sy = null;
    // 수평 스와이프가 수직보다 뚜렷하고 60px 이상일 때만 동작
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      navigatePeriod(dx < 0 ? 1 : -1);
    }
  }, { passive: true });
})();
